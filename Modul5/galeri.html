<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Galeri Foto CSS Flexbox</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .galeri {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }
        .galeri-item {
            width: 150px;  
            height: 150px;
            background-color: #4CAF50;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            font-weight: bold;
            border: 2px solid #388E3C;
            border-radius: 4px;
            overflow: hidden;
        }
        .galeri-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .galeri-item.no-img {
            background-color: #4CAF50;
        }
    </style>
</head>
<body>
    <h2>Galeri Foto 18 Item (150px × 150px)</h2>
    <p style="text-align:center; margin-bottom:15px; font-size:13px; color:#555;">
    </p>

    <div class="galeri">
        <div class="galeri-item"><img src="gambar/cat1.jpg"  alt="Foto 1"  onerror="this.parentElement.innerHTML='Foto 1'"></div>
        <div class="galeri-item"><img src="gambar/cat2.jpg"  alt="Foto 2"  onerror="this.parentElement.innerHTML='Foto 2'"></div>
        <div class="galeri-item"><img src="gambar/cat3.jpg"  alt="Foto 3"  onerror="this.parentElement.innerHTML='Foto 3'"></div>
        <div class="galeri-item"><img src="gambar/cat4.jpg"  alt="Foto 4"  onerror="this.parentElement.innerHTML='Foto 4'"></div>
        <div class="galeri-item"><img src="gambar/cat5.jpg"  alt="Foto 5"  onerror="this.parentElement.innerHTML='Foto 5'"></div>
        <div class="galeri-item"><img src="gambar/cat6.jpg"  alt="Foto 6"  onerror="this.parentElement.innerHTML='Foto 6'"></div>
        <div class="galeri-item"><img src="gambar/cat7.jpg"  alt="Foto 7"  onerror="this.parentElement.innerHTML='Foto 7'"></div>
        <div class="galeri-item"><img src="gambar/cat8.jpg"  alt="Foto 8"  onerror="this.parentElement.innerHTML='Foto 8'"></div>
        <div class="galeri-item"><img src="gambar/cat9.jpg"  alt="Foto 9"  onerror="this.parentElement.innerHTML='Foto 9'"></div>
        <div class="galeri-item"><img src="gambar/cat10.jpg" alt="Foto 10" onerror="this.parentElement.innerHTML='Foto 10'"></div>
        <div class="galeri-item"><img src="gambar/cat11.jpg" alt="Foto 11" onerror="this.parentElement.innerHTML='Foto 11'"></div>
        <div class="galeri-item"><img src="gambar/cat12.jpg" alt="Foto 12" onerror="this.parentElement.innerHTML='Foto 12'"></div>
        <div class="galeri-item"><img src="gambar/cat13.jpg" alt="Foto 13" onerror="this.parentElement.innerHTML='Foto 13'"></div>
        <div class="galeri-item"><img src="gambar/cat14.jpg" alt="Foto 14" onerror="this.parentElement.innerHTML='Foto 14'"></div>
        <div class="galeri-item"><img src="gambar/cat15.jpg" alt="Foto 15" onerror="this.parentElement.innerHTML='Foto 15'"></div>
        <div class="galeri-item"><img src="gambar/cat16.jpg" alt="Foto 16" onerror="this.parentElement.innerHTML='Foto 16'"></div>
        <div class="galeri-item"><img src="gambar/cat17.jpg" alt="Foto 17" onerror="this.parentElement.innerHTML='Foto 17'"></div>
        <div class="galeri-item"><img src="gambar/cat18.jpg" alt="Foto 18" onerror="this.parentElement.innerHTML='Foto 18'"></div>
    </div>
</body>
</html>
