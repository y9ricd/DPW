<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Basic Dialog jQuery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.2/themes/base/jquery-ui.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.2/jquery-ui.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f2f2f2; padding: 30px; }
        .box { background: white; padding: 25px; border-radius: 6px; max-width: 400px; margin: auto; border: 1px solid #ccc; }
        h2 { color: #041eb3; border-bottom: 2px solid #041eb3; padding-bottom: 6px; }
        button { background-color: #061b31; color: white; border: none; padding: 8px 18px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        button:hover { background-color: #092038; }
        a { display: inline-block; margin-top: 15px; font-size: 13px; color: #041eb3; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="box">
        <h2>10. Basic Dialog dengan jQuery</h2>
        <button id="btn-dialog">Buka Dialog</button>

        <div id="basic-dialog" title="Informasi" style="display:none;">
            <p>Ini adalah contoh <b>Basic Dialog</b> menggunakan jQuery UI.</p>
            <p>Dialog ini bisa ditutup dengan menekan tombol OK.</p>
        </div>

        <br>
        <a href="index.html">← Kembali ke Index</a>
    </div>

    <script>
        $(function() {
            $("#basic-dialog").dialog({
                autoOpen: false,
                modal: true,
                width: 350,
                buttons: {
                    "OK": function() { $(this).dialog("close"); }
                }
            });
            $("#btn-dialog").click(function() {
                $("#basic-dialog").dialog("open");
            });
        });
    </script>
</body>
</html>
