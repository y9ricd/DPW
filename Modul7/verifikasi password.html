<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Program Verifikasi Password</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f2f2f2; padding: 30px; }
        .box { background: white; padding: 25px; border-radius: 6px; max-width: 450px; margin: auto; border: 1px solid #ccc; }
        h2 { color: #041eb3; border-bottom: 2px solid #041eb3; padding-bottom: 6px; }
        button { background-color: #061b31; color: white; border: none; padding: 8px 18px; border-radius: 4px; cursor: pointer; font-size: 14px; }
        button:hover { background-color: #092038; }
        input[type="password"] { padding: 7px 10px; border: 1px solid #bbb; border-radius: 4px; font-size: 14px; width: 220px; }
        label { font-size: 14px; }
        p.hasil { margin-top: 12px; padding: 8px 12px; background-color: #eaf3fb; border-left: 4px solid #4a90d9; font-size: 14px; display: none; }
        a { display: inline-block; margin-top: 15px; font-size: 13px; color: #041eb3; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="box">
        <h2>6. Program Verifikasi Password</h2>
        <form name="formTesPass" onsubmit="return false;">
            Password Pengganti &nbsp;&nbsp;: <input type="password" name="password_1" /><br/><br/>
            Password Sekali Lagi : <input type="password" name="password_2" /><br/><br/>
            <button type="button" onclick="cekPassword()">Proses</button>
        </form>
        <p class="hasil" id="hasil-pass"></p>
        <br>
        <a href="index.html">← Kembali ke Index</a>
    </div>

    <script>
        function cekPassword() {
            var el = document.getElementById("hasil-pass");
            if (document.formTesPass.password_1.value == "") {
                alert("Password tidak boleh kosong!");
                return;
            }
            if (document.formTesPass.password_1.value !== document.formTesPass.password_2.value) {
                alert("Dua password yang Anda masukkan tidak sama");
            } else {
                el.textContent = "Password cocok! Berhasil disimpan.";
                el.style.display = "block";
            }
        }
    </script>
</body>
</html>
