<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Menu dengan jQuery</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.2/themes/base/jquery-ui.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jqueryui/1.13.2/jquery-ui.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f2f2f2; padding: 30px; }
        .box { background: white; padding: 25px; border-radius: 6px; max-width: 400px; margin: auto; border: 1px solid #ccc; }
        h2 { color: #041eb3; border-bottom: 2px solid #041eb3; padding-bottom: 6px; }
        ul#menu-jq { list-style: none; padding: 0; margin: 0; width: 200px; }
        ul#menu-jq li a { display: block; padding: 9px 14px; background-color: #f0f0f0; border: 1px solid #ccc; border-bottom: none; text-decoration: none; color: #333; font-size: 14px; }
        ul#menu-jq li:last-child a { border-bottom: 1px solid #ccc; }
        ul#menu-jq li a:hover, ul#menu-jq li.aktif a { background-color: #4a90d9; color: white; }
        p.hasil { margin-top: 12px; padding: 8px 12px; background-color: #eaf3fb; border-left: 4px solid #4a90d9; font-size: 14px; display: none; }
        a.back { display: inline-block; margin-top: 15px; font-size: 13px; color: #041eb3; text-decoration: none; }
        a.back:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="box">
        <h2>9. Menu dengan jQuery</h2>
        <ul id="menu-jq">
            <li><a href="#" data-hal="Beranda">Beranda</a></li>
            <li><a href="#" data-hal="Profil">Profil</a></li>
            <li><a href="#" data-hal="Galeri">Galeri</a></li>
            <li><a href="#" data-hal="Kontak">Kontak</a></li>
        </ul>
        <p class="hasil" id="hasil-menu"></p>
        <a class="back" href="index.html">← Kembali ke Index</a>
    </div>

    <script>
        $(function() {
            $("#menu-jq li a").click(function(e) {
                e.preventDefault();
                $("#menu-jq li").removeClass("aktif");
                $(this).parent().addClass("aktif");
                var hal = $(this).data("hal");
                $("#hasil-menu").text("Halaman aktif: " + hal).show();
            });
        });
    </script>
</body>
</html>
