<!DOCTYPE html>
<html>
<head>
    <title>2.6 </title>
</head>
<body>

<div id="content">

    <h1>Ujicoba Image Map</h1>

    <img src="./gambar/PETA.png" width="700" alt="Peta Indonesia" usemap="#petagambar">

    <map name="petagambar">
        <area shape="rect" coords="30,150,230,380"
              alt="Sumatera"
              href="https://id.wikipedia.org/wiki/Sumatera">

        <area shape="rect" coords="230,150,430,330"
              alt="Kalimantan"
              href="https://id.wikipedia.org/wiki/Kalimantan">

        <area shape="rect" coords="430,180,550,370"
              alt="Sulawesi"
              href="https://id.wikipedia.org/wiki/Sulawesi">

        <area shape="rect" coords="550,180,690,420"
              alt="Papua"
              href="https://id.wikipedia.org/wiki/Papua">
    </map>

    <h2>Kesimpulan</h2>
    <p>Image map ini dapat digunakan untuk mengklik beberapa area pada satu gambar dan akan dialihkan ke halaman berbeda</p>

</div>

</body>
</html>
