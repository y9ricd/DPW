<!DOCTYPE html>
<html lang="en">
<head>
    <title>Halaman Event</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { box-sizing: border-box; }
        body { font-family: Arial, Helvetica, sans-serif; }
        header {
            background-color: #000000;
            padding: 30px;
            text-align: center;
            font-size: 35px;
            color: white;
        }
        nav {
            float: left;
            width: 30%;
            height: 450px;
            background: #ccc;
            padding: 20px;
        }
        nav ul { list-style-type: none; padding: 0; }
        nav ul li a { text-decoration: none; color: #333; }
        article {
            float: left;
            padding: 20px;
            width: 70%;
            background-color: #ffffff;
            min-height: 450px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-top: 10px;
        }
        .gallery img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border: 2px solid #000000;
            cursor: pointer;
            transition: transform 0.3s;
        }
        .gallery img:hover { transform: scale(1.05); }
        #info-box {
            margin-top: 15px;
            padding: 10px;
            background-color: #fff;
            border: 1px solid #ccc;
            min-height: 40px;
            font-style: italic;
            color: #000000;
        }
        section::after { content: ""; display: table; clear: both; }
        footer {
            background-color: #ce3a00;
            padding: 10px;
            text-align: center;
            color: white;
        }
    </style>
</head>
<body>
    <header><h2>HTML Lanjut</h2></header>
    <section>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="gambar.html">Gambar</a></li>
                <li><a href="event.html">Event</a></li>
                <li><a href="audio.html">Audio</a></li>
                <li><a href="video.html">Video</a></li>
                <li><a href="svg.html">SVG</a></li>
                <li><a href="canvas.html">Canvas</a></li>
            </ul>
        </nav>
        <article>
            <h1>Gambar dengan Mouse Event</h1>
            <div id="info-box">Hover pada gambar untuk info...</div>
            <div class="gallery">
                <img src="gambar/cat1.jpg" alt="Foto 1"
                    onmouseover="document.getElementById('info-box').innerHTML=' Click 1x'"
                    onmouseout="document.getElementById('info-box').innerHTML='Pada gambar pertama menunjukan Bar ketika di click 1x'"
                    onclick="alert('HAIII')">
                <img src="gambar/cat2.jpg" alt="Foto 2"
                    onmouseover="document.getElementById('info-box').innerHTML=' Click 2x'"
                    onmouseout="document.getElementById('info-box').innerHTML='Pada gambar kedua menunjukan Bar ketika di click 2x'"
                    ondblclick="alert('HALLO')">
                <img src="gambar/cat3.jpg" alt="Foto 3"
                    onmouseover="this.style.opacity='0.6'; document.getElementById('info-box').innerHTML='Arahkan cursor untuk merubah opacity gambar'"
                    onmouseout="this.style.opacity='1'; document.getElementById('info-box').innerHTML='Pada gambar ketiga menunjukan perubahan opacity gambar'"
                    onclick="document.getElementById('info-box').innerHTML=' Foto 3 diklik'">
                <img src="gambar/cat4.jpg" alt="Foto 4"
                    onmouseover="this.style.border='4px solid red'; document.getElementById('info-box').innerHTML=' Arahkan cursor pada gambar ke empat untuk merubah border pada gambar'"
                    onmouseout="this.style.border='2px solid #000000    '; document.getElementById('info-box').innerHTML='Pada gambar ke empat menunjukan perubahan warna border yang berwarna merah'"
                    oncontextmenu="alert('Klik kanan tidak diizinkan!'); return false;">
                <img src="gambar/cat5.jpg" alt="Foto 5"
                    onmouseover="document.getElementById('info-box').innerHTML='Tahan Click untuk merubah navigator pada kolom ini'"
                    onmouseout="document.getElementById('info-box').innerHTML='Pada gambar ke 5 ketika di tekan akan merubah warna symbol dan ketika di lepas juga akan berubah'"
                    onmousedown="document.getElementById('info-box').innerHTML='🔴 Mouse ditekan Foto 5'"
                    onmouseup="document.getElementById('info-box').innerHTML='🟢 Mouse dilepas Foto 5'">
                <img src="gambar/cat6.jpg" alt="Foto 6"
                    onmouseover="document.getElementById('info-box').innerHTML='click untuk memutar gambar'"
                    onmouseout="document.getElementById('info-box').innerHTML='Pada gambar ke enam ini ketika di click akan berputar'"
                    onclick="this.style.transform='rotate(180deg)'; document.getElementById('info-box').innerHTML=' Foto 6 diputar'">
                   
            </div>
            <p><strong>NIM:</strong> 253307025 | <strong>Nama:</strong> Mohammad Saputra Abdul Farid</p>
        </article>
    </section>
    <footer><p>copyright@faridganteng 2026</p></footer>
</body>
</html>
