<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Template Website CSS</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        #wrapper {
            width: 700px;
            margin: 20px auto;
            border: 1px solid #999;
            background-color: #fff;
        }

        /* HEADER */
        #header {
            background-color: blue;
            color: white;
            padding: 15px 20px;
        }
        #header h1 {
            font-size: 28px;
            color: yellow;
        }
        #header p {
            font-size: 13px;
            color: white;
        }

        /* MAIN */
        #main {
            display: flex;
        }

        /* NAV */
        #nav {
            width: 180px;
            border: 2px dashed #555;
            padding: 10px;
            flex-shrink: 0;
        }
        #nav ul {
            list-style: none;
            padding: 0;
        }
        #nav ul li {
            padding: 5px 0;
        }
        #nav ul li a {
            text-decoration: none;
            color: #000;
            font-size: 14px;
        }
        #nav ul li a:hover {
            text-decoration: underline;
            color: blue;
            font-weight: bold;
        }

        /* DIVIDER */
        #divider {
            width: 2px;
            background-color: #ccc;
        }

        /* CONTENT */
        #content {
            flex: 1;
            padding: 20px;
        }

        /* FOOTER */
        #footer {
            background-color: #ddd;
            text-align: right;
            padding: 10px 20px;
            font-size: 13px;
            color: #444;
        }
    </style>
</head>
<body>
    <div id="wrapper">

        <div id="header">
            <h1>CSS</h1>
            <p>Website CSS</p>
        </div>

        <div id="main">

            <div id="nav">
                <ul>
                    <li><a href="#">Menu 1</a></li>
                    <li><a href="#">Menu 2</a></li>
                    <li><a href="#">Menu 3</a></li>
                    <li><a href="#">Menu 4</a></li>
                    <li><a href="#">Menu 5</a></li>
                    <li><a href="#" style="text-decoration:underline; font-weight:bold;">Menu 6</a></li>
                </ul>
            </div>

            <div id="divider"></div>

            <div id="content">
                <p>Isi konten halaman di sini.</p>
            </div>

        </div>

        <div id="footer">
            Mohammad Saputra Abdul Farid | 253307025 | TI-2A
        </div>

    </div>
</body>
</html>
